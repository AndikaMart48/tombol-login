<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Windows Login Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: url('attachment://unnamed') center/cover no-repeat fixed;
      position: relative;
      animation: fadeIn 0.8s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.clockBox {
      position: absolute;
      top: 20px;
      right: 30px;
      text-align: right;
      color: white;
      text-shadow: 0 3px 12px rgba(0,0,0,0.8);
      z-index: 50;
      animation: slideDown 0.6s ease;
    }
    @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.clock {
      font-size: clamp(34px, 6vw, 52px);
      font-weight: 100;
      line-height: 1;
      letter-spacing: -1px;
    }
.date {
      font-size: clamp(13px, 2.5vw, 17px);
      font-weight: 300;
      opacity: 0.85;
      margin-top: 3px;
    }
.greeting {
      font-size: clamp(11px, 2vw, 14px);
      opacity: 0.7;
      margin-top: 2px;
    }
.loginBox {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: white;
      width: 90%;
      max-width: 340px;
      animation: popIn 0.5s ease 0.3s both;
    }
    @keyframes popIn { from { transform: translate(-50%, -45%); opacity: 0; } to { transform: translate(-50%, -50%); opacity: 1; } }
.avatar {
      width: clamp(100px, 22vw, 120px);
      height: clamp(100px, 22vw, 120px);
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.8);
      object-fit: cover;
      margin: 0 auto 18px;
      cursor: pointer;
      display: block;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
.avatar:hover {
      transform: scale(1.08) rotate(3deg);
      border-color: #0078d4;
      box-shadow: 0 12px 40px rgba(0,120,212,0.5);
    }
.userName {
      font-size: clamp(22px, 5vw, 28px);
      font-weight: 400;
      margin-bottom: 8px;
      text-shadow: 0 3px 12px rgba(0,0,0,0.9);
    }
.pinText {
      font-size: clamp(12px, 3vw, 15px);
      margin-bottom: 18px;
      opacity: 0.85;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
    }
    input {
      width: 100%;
      max-width: 300px;
      padding: 12px 16px;
      background: rgba(0,0,0,0.45);
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 6px;
      color: white;
      font-size: 15px;
      margin-bottom: 12px;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }
    input::placeholder { color: rgba(255,255,255,0.6); }
    input:focus {
      outline: none;
      border-color: #0078d4;
      background: rgba(0,0,0,0.65);
      transform: scale(1.02);
    }
    button {
      width: 100%;
      max-width: 300px;
      padding: 12px;
      background: linear-gradient(135deg, #0078d4, #106ebe);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(0,120,212,0.3);
    }
    button:hover {
      background: linear-gradient(135deg, #106ebe, #005a9e);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,120,212,0.4);
    }
    button:active { transform: translateY(0); }
.appGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 28px auto;
      width: 100%;
      max-width: 300px;
    }
.appBtn {
      padding: 12px 5px;
      background: rgba(0,0,0,0.45);
      border: 1.5px solid rgba(255,255,255,0.4);
      border-radius: 8px;
      color: white;
      font-size: clamp(12px, 2.5vw, 14px);
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }
.appBtn:hover {
      background: rgba(0,120,212,0.6);
      border-color: #0078d4;
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 6px 20px rgba(0,120,212,0.3);
    }
.hidden { display: none; }
.status {
      font-size: 13px;
      margin-bottom: 10px;
      min-height: 18px;
      font-weight: 500;
    }
.bottomControls {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 100;
      width: 90%;
      max-width: 320px;
      animation: slideUp 0.6s ease 0.5s both;
    }
    @keyframes slideUp { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
.bottomBtn {
      padding: 10px 18px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 6px;
      cursor: pointer;
      font-size: clamp(12px, 2.5vw, 14px);
      width: 100%;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }
.bottomBtn:hover {
      background: rgba(0,120,212,0.7);
      border-color: #0078d4;
      transform: translateY(-2px);
    }
.resetBtn {
      background: rgba(220,38,38,0.7);
      border-color: rgba(239,68,68,0.8);
    }
.resetBtn:hover {
      background: rgba(185,28,28,0.8);
    }
.copyright {
      font-size: clamp(11px, 2.2vw, 13px);
      color: rgba(255,255,255,0.9);
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
      margin-top: 4px;
      text-align: center;
      font-weight: 500;
    }
@media (max-height: 600px) {
.clockBox { top: 12px; right: 18px; }
.loginBox { top: 48%; }
.bottomControls { bottom: 12px; }
}
  </style>
</head>
<body>
  <div class="clockBox">
    <div class="clock" id="clock">00:00:00</div>
    <div class="date" id="date">Loading...</div>
    <div class="greeting" id="greeting">Selamat datang</div>
  </div>

  <div class="loginBox">
    <img class="avatar" id="avatar" src="attachment://unnamed" onclick="changePhoto()">
    <input type="file" id="fileInput" accept="image/*" onchange="loadFoto(event)" style="display:none">

    <div id="loginForm">
      <div class="status" id="statusMsg"></div>
      <input type="text" id="nameInput" placeholder="Masukkan nama Anda">
      <input type="password" id="pinInput" placeholder="Masukkan PIN">
      <button onclick="login()">Sign in</button>
    </div>

    <div id="desktopForm" class="hidden">
      <div class="userName" id="userName">User</div>
      <div class="pinText">Klik foto untuk ganti profil • Klik app untuk buka</div>

      <div class="appGrid">
        <div class="appBtn" onclick="bukaApp('instagram')">Instagram</div>
        <div class="appBtn" onclick="bukaApp('whatsapp')">WhatsApp</div>
        <div class="appBtn" onclick="bukaApp('facebook')">Facebook</div>
        <div class="appBtn" onclick="bukaApp('tiktok')">TikTok</div>
        <div class="appBtn" onclick="bukaApp('youtube')">YouTube</div>
        <div class="appBtn" onclick="bukaApp('google')">Google</div>
      </div>
    </div>
  </div>

  <div class="bottomControls">
    <button class="bottomBtn" id="backBtn" onclick="logout()" style="display:none;">← Kembali ke Login</button>
    <button class="bottomBtn" onclick="document.getElementById('wallpaperInput').click()">🖼️ Ganti Wallpaper</button>
    <button class="bottomBtn resetBtn" onclick="resetAllData()">🗑️ Reset Semua Data</button>
    <input type="file" id="wallpaperInput" accept="image/*" onchange="loadWallpaper(event)" style="display:none">
    <div class="copyright">@2026 Hak Cipta Adrianus Marut</div>
  </div>

  <script>
    const avatar = document.getElementById('avatar');
    const nameInput = document.getElementById('nameInput');
    const pinInput = document.getElementById('pinInput');
    const statusMsg = document.getElementById('statusMsg');
    const loginForm = document.getElementById('loginForm');
    const desktopForm = document.getElementById('desktopForm');
    const userName = document.getElementById('userName');
    const clockEl = document.getElementById('clock');
    const dateEl = document.getElementById('date');
    const greetingEl = document.getElementById('greeting');
    const backBtn = document.getElementById('backBtn');

    const defaultAvatar = "attachment://unnamed";

    let currentName = localStorage.getItem('currentUser') || '';
    let isLogin = localStorage.getItem('isLogin') === 'true';

    function updateClock() {
      const now = new Date();
      clockEl.textContent = now.toLocaleTimeString('en-US', { hour12: false });
      dateEl.textContent = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });
      const hour = now.getHours();
      if (hour < 11) greetingEl.textContent = 'Selamat Pagi';
      else if (hour < 15) greetingEl.textContent = 'Selamat Siang';
      else if (hour < 18) greetingEl.textContent = 'Selamat Sore';
      else greetingEl.textContent = 'Selamat Malam';
    }
    updateClock();
    setInterval(updateClock, 1000);

    const savedWallpaper = localStorage.getItem('wallpaper');
    if (savedWallpaper) {
      document.body.style.backgroundImage = `url(${savedWallpaper})`;
    }

    // PENTING: Load foto pas awal buka, walau belum login
    if (currentName) {
      loadUserPhoto(currentName);
    }
    if (isLogin && currentName) {
      loginSuccess();
    }

    function changePhoto() {
      document.getElementById('fileInput').click();
    }

    function loadFoto(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = e => {
        avatar.src = e.target.result;
        let saveName = isLogin? currentName : nameInput.value.trim();
        if (saveName) {
          let key = 'photo_' + saveName.toLowerCase();
          localStorage.setItem(key, e.target.result);
          localStorage.setItem('lastPhotoUser', saveName.toLowerCase()); // backup key
          statusMsg.textContent = '✓ Foto berhasil diperbarui';
          statusMsg.style.color = '#4ade80';
          setTimeout(() => statusMsg.textContent = '', 2000);
        }
      }
      reader.readAsDataURL(file);
    }

    function loadWallpaper(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = e => {
          document.body.style.backgroundImage = `url(${e.target.result})`;
          localStorage.setItem('wallpaper', e.target.result);
        }
        reader.readAsDataURL(file);
      }
    }

    function loadUserPhoto(nama) {
      let key = 'photo_' + nama.toLowerCase();
      let foto = localStorage.getItem(key);
      avatar.src = foto || defaultAvatar;
    }

    function login() {
      let nama = nameInput.value.trim();
      let pin = pinInput.value;

      if (!nama) {
        alert('Masukkan nama dulu bos');
        return;
      }

      currentName = nama;
      localStorage.setItem('currentUser', nama);

      let pinKey = 'pin_' + nama.toLowerCase();
      let savedPin = localStorage.getItem(pinKey);

      if (!savedPin) {
        if (pin.length < 4) {
          alert('PIN minimal 4 digit');
          return;
        }
        localStorage.setItem(pinKey, pin);
        statusMsg.textContent = '✓ Akun baru berhasil dibuat';
        statusMsg.style.color = '#4ade80';
      } else {
        if (pin!== savedPin) {
          alert('PIN salah bos, coba lagi');
          pinInput.value = '';
          return;
        }
      }

      loadUserPhoto(nama);
      isLogin = true;
      localStorage.setItem('isLogin', 'true');
      loginSuccess();
    }

    function loginSuccess() {
      userName.textContent = currentName;
      loginForm.classList.add('hidden');
      desktopForm.classList.remove('hidden');
      backBtn.style.display = 'block';
      nameInput.value = '';
      pinInput.value = '';
      statusMsg.textContent = '';
    }

    function logout() {
      isLogin = false;
      localStorage.setItem('isLogin', 'false');
      desktopForm.classList.add('hidden');
      loginForm.classList.remove('hidden');
      backBtn.style.display = 'none';

      if (currentName) {
        loadUserPhoto(currentName); // load lagi foto pas balik ke login
      } else {
        avatar.src = defaultAvatar;
      }

      nameInput.value = '';
      pinInput.value = '';
    }

    function resetAllData() {
      if (confirm('Yakin mau reset semua data? Foto, PIN, wallpaper semua bakal hilang!')) {
        localStorage.clear();
        location.reload();
      }
    }

    function bukaApp(app) {
      const links = {
        'instagram': 'https://www.instagram.com',
        'whatsapp': 'https://web.whatsapp.com',
        'facebook': 'https://web.facebook.com',
        'tiktok': 'https://www.tiktok.com',
        'youtube': 'https://www.youtube.com',
        'google': 'https://www.google.com'
      };
      window.open(links[app], '_blank');
    }
  </script>
</body>
</html>
