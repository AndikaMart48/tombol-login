<!DOCTYPE html>
<html>
<head>
  <title>Login Windows KW</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
    }
 .profile-pic {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.8);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      margin-bottom: 20px;
      object-fit: cover;
      cursor: pointer;
    }
.name-text {
      color: white;
      font-size: 28px;
      font-weight: 500;
      margin-bottom: 25px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
.pin-label {
      color: rgba(255,255,255,0.9);
      font-size: 18px;
      margin-bottom: 12px;
    }
.pin-input {
      padding: 12px 20px;
      font-size: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      background: rgba(255,255,255,0.15);
      color: white;
      text-align: center;
      letter-spacing: 8px;
      width: 220px;
      outline: none;
      backdrop-filter: blur(10px);
    }
.pin-input:focus {
      border-color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.25);
    }
.pin-input::placeholder {
      color: rgba(255,255,255,0.5);
      letter-spacing: normal;
    }
.forgot-pin {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      margin-top: 15px;
      cursor: pointer;
      text-decoration: underline;
    }
.forgot-pin:hover {
      color: white;
    }
.btn {
      margin-top: 25px;
      color: white;
      border: none;
      padding: 12px 40px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      background: rgba(255,255,255,0.2);
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }
.btn:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.05);
    }
.btn-logout {
      background: rgba(239, 68, 68, 0.7);
    }
.btn-logout:hover {
      background: rgba(239, 68, 68, 0.9);
    }
    #welcome {
      margin-top: 30px;
      font-size: 24px;
      color: white;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    footer {
      position: absolute;
      bottom: 20px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    }
.confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      top: -10px;
      animation: fall 3s linear forwards;
      z-index: 1;
    }
    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }
.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <img class="profile-pic" id="profilePic" src="attachment://0" alt="Foto Profil" onclick="document.getElementById('fileInput').click()">
  <input type="file" id="fileInput" accept="image/*" onchange="loadFoto(event)" style="display:none">

  <div class="name-text" id="nameText">Andrianus Marut</div>

  <!-- Area PIN - muncul pas belum login -->
  <div id="loginArea">
    <div class="pin-label">Masukkan PIN Anda</div>
    <input type="password" class="pin-input" id="pinInput" placeholder="PIN" maxlength="6">
    <div class="forgot-pin" onclick="resetPIN()">Lupa PIN</div>
    <button class="btn" onclick="cekPIN()">Masuk</button>
  </div>

  <!-- Area Logout - muncul pas udah login -->
  <div id="logoutArea" class="hidden">
    <div id="welcome"></div>
    <button class="btn btn-logout" onclick="logout()">Logout</button>
  </div>

  <footer>@ 2026 Hak Cipta Adrianus Marut</footer>

  <script>
    const profilePic = document.getElementById('profilePic');
    const nameText = document.getElementById('nameText');
    const pinInput = document.getElementById('pinInput');
    const welcome = document.getElementById('welcome');
    const loginArea = document.getElementById('loginArea');
    const logoutArea = document.getElementById('logoutArea');

    let nama = localStorage.getItem('namaUser') || 'Andrianus Marut';
    let isLogin = localStorage.getItem('isLogin') === 'true';

    nameText.textContent = nama;

    const fotoTersimpan = localStorage.getItem('fotoUser');
    if (fotoTersimpan) {
      profilePic.src = fotoTersimpan;
    }

    // Update tampilan pas pertama buka
    updateUI();

    function loadFoto(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          profilePic.src = e.target.result;
          localStorage.setItem('fotoUser', e.target.result);
        }
        reader.readAsDataURL(file);
      }
    }

    function createConfetti() {
      const colors = ['#ff0', '#f0f', '#0ff', '#f00', '#0f0', '#00f', '#ff8c00'];
      for (let i = 0; i < 100; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDelay = Math.random() * 0.5 + 's';
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 3000);
      }
    }

    function cekPIN() {
      let pinTersimpan = localStorage.getItem('pinUser');
      let pinMasukkan = pinInput.value;

      if (!pinTersimpan) {
        if (pinMasukkan.length < 4) {
          alert('PIN minimal 4 angka bos!');
          return;
        }
        localStorage.setItem('pinUser', pinMasukkan);
        loginSukses();
      } else {
        if (pinMasukkan === pinTersimpan) {
          loginSukses();
        } else {
          alert('PIN salah bos! Coba lagi.');
          pinInput.value = '';
          pinInput.focus();
        }
      }
    }

    function loginSukses() {
      isLogin = true;
      localStorage.setItem('isLogin', 'true');
      createConfetti();
      updateUI();
      setTimeout(() => {
        window.open('https://www.google.com', '_blank');
      }, 500);
    }

    function logout() {
      let yakin = confirm(`Yakin mau logout, ${nama}?`);
      if (yakin) {
        isLogin = false;
        localStorage.setItem('isLogin', 'false');
        pinInput.value = '';
        updateUI();
      }
    }

    function resetPIN() {
      let yakin = confirm('Yakin mau reset PIN? PIN lama bakal kehapus.');
      if (yakin) {
        localStorage.removeItem('pinUser');
        alert('PIN udah direset. Ketik PIN baru pas login lagi.');
        pinInput.value = '';
        pinInput.focus();
      }
    }

    function updateUI() {
      if (isLogin) {
        loginArea.classList.add('hidden');
        logoutArea.classList.remove('hidden');
        welcome.textContent = `Halo ${nama}, lu udah login! 🎉`;
      } else {
        loginArea.classList.remove('hidden');
        logoutArea.classList.add('hidden');
        welcome.textContent = '';
      }
    }

    pinInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        cekPIN();
      }
    });
  </script>
</body>
</html>
