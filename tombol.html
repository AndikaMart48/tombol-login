<!DOCTYPE html>
<html>
<head>
  <title>Tombol Login</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
      font-family: Arial, sans-serif;
    }
    button {
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 18px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }
    .login {
      background-color: #8b5cf6;
    }
    .logout {
      background-color: #ef4444;
    }
    #welcome {
      margin-top: 20px;
      font-size: 20px;
      color: #333;
    }
  </style>
</head>
<body>
  <button id="btnLogin" onclick="toggleLogin()">Login</button>
  <div id="welcome"></div>

  <script>
    const btn = document.getElementById('btnLogin');
    const welcome = document.getElementById('welcome');
    
    let isLogin = localStorage.getItem('isLogin') === 'true';
    updateUI();

    function toggleLogin() {
      if (isLogin) {
        isLogin = false;
        localStorage.setItem('isLogin', 'false');
      } else {
        isLogin = true;
        localStorage.setItem('isLogin', 'true');
        updateUI(); // update tampilan jadi Logout dulu
        window.open('https://www.google.com', '_blank'); // baru buka Google
        return;
      }
      updateUI();
    }

    function updateUI() {
      if (isLogin) {
        btn.textContent = 'Logout';
        btn.className = 'logout';
        welcome.textContent = 'Halo, lu udah login! 🎉';
      } else {
        btn.textContent = 'Login';
        btn.className = 'login';
        welcome.textContent = '';
      }
    }
  </script>
</body>
</html>
