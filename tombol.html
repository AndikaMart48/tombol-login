<!DOCTYPE html>
<html>
<head>
  <title>Tombol Login</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
    }
    button {
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 18px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }
    .login {
      background-color: #8b5cf6;
    }
    .logout {
      background-color: #ef4444;
    }
  </style>
</head>
<body>
  <button id="btnLogin" class="login" onclick="toggleLogin()">Login</button>

  <script>
    let isLogin = false;
    
    function toggleLogin() {
      const btn = document.getElementById('btnLogin');
      if (isLogin) {
        btn.textContent = 'Login';
        btn.className = 'login';
        isLogin = false;
      } else {
        btn.textContent = 'Logout';
        btn.className = 'logout';
        isLogin = true;
      }
    }
  </script>
</body>
</html>
