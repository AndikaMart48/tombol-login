<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Windows Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: url('attachment://unnamed') center/cover no-repeat fixed;
      position: relative;
    }
.clockBox {
      position: absolute;
      top: 15px;
      right: 20px;
      text-align: right;
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
      z-index: 50;
    }
.clock {
      font-size: clamp(32px, 6vw, 48px);
      font-weight: 200;
      line-height: 1;
    }
.date {
      font-size: clamp(12px, 2.5vw, 16px);
      font-weight: 300;
      opacity: 0.9;
    }
.loginBox {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: white;
      width: 90%;
      max-width: 320px;
    }
.avatar {
      width: clamp(90px, 20vw, 110px);
      height: clamp(90px, 20vw, 110px);
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.7);
      object-fit: cover;
      margin: 0 auto 15px;
      cursor: pointer;
      display: block;
      transition: transform 0.2s;
    }
.avatar:hover {
      transform: scale(1.05);
      border-color: white;
    }
.userName {
      font-size: clamp(20px, 5vw, 26px);
      font-weight: 400;
      margin-bottom: 20px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
    }
.pinText {
      font-size: clamp(12px, 3vw, 14px);
      margin-bottom: 15px;
      opacity: 0.9;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
    }
    input {
      width: 100%;
      max-width: 280px;
      padding: 10px 14px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 3px;
      color: white;
      font-size: 15px;
      margin-bottom: 12px;
    }
    input::placeholder {
      color: rgba(255,255,255,0.6);
    }
    input:focus {
      outline: none;
      border-color: white;
      background: rgba(0,0,0,0.7);
    }
    button {
      width: 100%;
      max-width: 280px;
      padding: 10px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 3px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      background: #106ebe;
    }
.appGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 25px auto;
      width: 100%;
      max-width: 280px;
    }
.appBtn {
      padding: 10px 5px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 3px;
      color: white;
      font-size: clamp(11px, 2.5vw, 13px);
      cursor: pointer;
    }
.appBtn:hover {
      background: rgba(0,0,0,0.7);
      border-color: white;
    }
.hidden { display: none; }
.status {
      font-size: 13px;
      margin-bottom: 10px;
      min-height: 18px;
    }
.bottomControls {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      z-index: 100;
      width: 90%;
      max-width: 300px;
    }
.bottomBtn {
      padding: 8px 16px;
      background: rgba(0,0,0,0.7);
      color: white;
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 4px;
      cursor: pointer;
      font-size: clamp(11px, 2.5vw, 13px);
      width: 100%;
    }
.bottomBtn:hover {
      background: rgba(0,0,0,0.9);
      border-color: white;
    }
.copyright {
      font-size: clamp(10px, 2.2vw, 12px);
      color: rgba(255,255,255,0.9);
      text-shadow: 0 2px 6px rgba(0,0,0,0.9);
      margin-top: 3px;
      text-align: center;
    }

@media (max-height: 600px) {
.clockBox { top: 10px; right: 15px; }
.loginBox { top: 48%; }
.bottomControls { bottom: 10px; }
}
  </style>
</head>
<body>
  <div class="clockBox">
    <div class="clock" id="clock">00:00:00</div>
    <div class="date" id="date">Loading...</div>
  </div>

  <div class="loginBox">
    <img class="avatar" id="avatar" src="attachment://unnamed" onclick="changePhoto()">
    <input type="file" id="fileInput" accept="image/*" onchange="loadFoto(event)" style="display:none">

    <div id="loginForm">
      <div class="status" id="statusMsg"></div>
      <input type="text" id="nameInput" placeholder="Masukkan nama">
      <input type="password" id="pinInput" placeholder="Masukkan PIN">
      <button onclick="login()">Sign in</button>
    </div>

    <div id="desktopForm" class="hidden">
      <div class="userName" id="userName">User</div>
      <div class="pinText">Klik foto untuk ganti profil</div>

      <div class="appGrid">
        <div class="appBtn" onclick="bukaApp('instagram')">Instagram</div>
        <div class="appBtn" onclick="bukaApp('whatsapp')">WhatsApp</div>
        <div class="appBtn" onclick="bukaApp('facebook')">Facebook</div>
        <div class="appBtn" onclick="bukaApp('tiktok')">TikTok</div>
        <div class="appBtn" onclick="bukaApp('youtube')">YouTube</div>
        <div class="appBtn" onclick="bukaApp('google')">Google</div>
      </div>
    </div>
  </div>

  <div class="bottomControls">
    <button class="bottomBtn" id="backBtn" onclick="logout()" style="display:none;">Kembali ke Login</button>
    <button class="bottomBtn" onclick="document.getElementById('wallpaperInput').click()">Ganti Wallpaper</button>
    <input type="file" id="wallpaperInput" accept="image/*" onchange="loadWallpaper(event)" style="display:none">
    <div class="copyright">@2026 Hak Cipta Adrianus Marut</div>
  </div>

  <script>
    const avatar = document.getElementById('avatar');
    const nameInput = document.getElementById('nameInput');
    const pinInput = document.getElementById('pinInput');
    const statusMsg = document.getElementById('statusMsg');
    const loginForm = document.getElementById('loginForm');
    const desktopForm = document.getElementById('desktopForm');
    const userName = document.getElementById('userName');
    const clockEl = document.getElementById('clock');
    const dateEl = document.getElementById('date');
    const backBtn = document.getElementById('backBtn');

    const defaultAvatar = "attachment://unnamed";
    let currentName = localStorage.getItem('currentUser') || '';
    let isLogin = localStorage.getItem('isLogin') === 'true';

    function updateClock() {
      const now = new Date();
      clockEl.textContent = now.toLocaleTimeString('en-US', { hour12: false });
      dateEl.textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    const savedWallpaper = localStorage.getItem('wallpaper');
    if (savedWallpaper) {
      document.body.style.backgroundImage = `url(${savedWallpaper})`;
    }

    if (isLogin && currentName) {
      loadUserPhoto(currentName);
      loginSuccess();
    }

    function changePhoto() {
      document.getElementById('fileInput').click();
    }

    function loadFoto(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = e => {
        avatar.src = e.target.result;

        let saveName = isLogin? currentName : nameInput.value.trim();
        if (saveName) {
          let key = 'photo_' + saveName.toLowerCase();
          localStorage.setItem(key, e.target.result);
          statusMsg.textContent = 'Foto diperbarui';
          statusMsg.style.color = '#4ade80';
          setTimeout(() => statusMsg.textContent = '', 2000);
        }
      }
      reader.readAsDataURL(file);
    }

    function loadWallpaper(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = e => {
          document.body.style.backgroundImage = `url(${e.target.result})`;
          localStorage.setItem('wallpaper', e.target.result);
        }
        reader.readAsDataURL(file);
      }
    }

    function loadUserPhoto(nama) {
      let key = 'photo_' + nama.toLowerCase();
      let foto = localStorage.getItem(key);
      avatar.src = foto || defaultAvatar;
    }

    function login() {
      let nama = nameInput.value.trim();
      let pin = pinInput.value;

      if (!nama) {
        alert('Masukkan nama');
        return;
      }

      currentName = nama;
      let pinKey = 'pin_' + nama.toLowerCase();
      let savedPin = localStorage.getItem(pinKey);

      if (!savedPin) {
        if (pin.length < 4) {
          alert('PIN minimal 4 digit');
          return;
        }
        localStorage.setItem(pinKey, pin);
        statusMsg.textContent = 'Akun baru dibuat';
        statusMsg.style.color = '#4ade80';
      } else {
        if (pin!== savedPin) {
          alert('PIN salah');
          pinInput.value = '';
          return;
        }
      }

      loadUserPhoto(nama);
      isLogin = true;
      localStorage.setItem('isLogin', 'true');
      localStorage.setItem('currentUser', nama);
      loginSuccess();
    }

    function loginSuccess() {
      userName.textContent = currentName;
      loginForm.classList.add('hidden');
      desktopForm.classList.remove('hidden');
      backBtn.style.display = 'block';
      nameInput.value = '';
      pinInput.value = '';
      statusMsg.textContent = '';
    }

    function logout() {
      isLogin = false;
      localStorage.setItem('isLogin', 'false');
      desktopForm.classList.add('hidden');
      loginForm.classList.remove('hidden');
      backBtn.style.display = 'none';

      if (currentName) {
        loadUserPhoto(currentName);
      } else {
        avatar.src = defaultAvatar;
      }

      nameInput.value = '';
      pinInput.value = '';
    }

    function bukaApp(app) {
      const links = {
        'instagram': 'https://www.instagram.com',
        'whatsapp': 'https://web.whatsapp.com',
        'facebook': 'https://web.facebook.com',
        'tiktok': 'https://www.tiktok.com',
        'youtube': 'https://www.youtube.com',
        'google': 'https://www.google.com'
      };
      window.open(links[app], '_blank');
    }
  </script>
</body>
</html>
