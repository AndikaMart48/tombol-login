<!DOCTYPE html>
<html>
<head>
  <title>Tombol Login Keren</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Arial', sans-serif;
    }
   .profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid white;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      margin-bottom: 15px;
      object-fit: cover;
      cursor: pointer;
    }
   .upload-label {
      color: white;
      font-size: 14px;
      margin-bottom: 25px;
      cursor: pointer;
      text-decoration: underline;
    }
    input[type="file"] {
      display: none;
    }
    button {
      color: white;
      border: none;
      padding: 18px 50px;
      font-size: 20px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    button:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
   .login {
      background: linear-gradient(135deg, #8b5cf6, #a855f7);
    }
   .logout {
      background: linear-gradient(135deg, #ef4444, #f87171);
    }
    #welcome {
      margin-top: 30px;
      font-size: 24px;
      color: white;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    footer {
      position: absolute;
      bottom: 20px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <!-- Upload Foto -->
  <img class="profile-pic" id="profilePic" src="https://via.placeholder.com/120" alt="Foto Profil" onclick="document.getElementById('fileInput').click()">
  <label class="upload-label" for="fileInput">Klik foto buat ganti</label>
  <input type="file" id="fileInput" accept="image/*" onchange="loadFoto(event)">

  <button id="btnLogin" onclick="toggleLogin()">Login</button>
  <div id="welcome"></div>
  <footer>@ 2026 Hak Cipta Adrianus Marut</footer>

  <script>
    const btn = document.getElementById('btnLogin');
    const welcome = document.getElementById('welcome');
    const profilePic = document.getElementById('profilePic');

    let nama = localStorage.getItem('namaUser') || 'Bos';
    let isLogin = localStorage.getItem('isLogin') === 'true';
    updateUI();

    function loadFoto(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          profilePic.src = e.target.result;
        }
        reader.readAsDataURL(file);
      }
    }

    function toggleLogin() {
      if (isLogin) {
        let yakin = confirm(`Yakin mau logout, ${nama}?`);
        if (yakin) {
          isLogin = false;
          localStorage.setItem('isLogin', 'false');

          welcome.textContent = `Sampai jumpa lagi, ${nama}! 👋`;
          btn.disabled = true;

          setTimeout(() => {
            updateUI();
            btn.disabled = false;
          }, 2000);
        }
      } else {
        isLogin = true;
        localStorage.setItem('isLogin', 'true');

        if (!localStorage.getItem('namaUser')) {
          nama = prompt('Siapa nama lu bos?') || 'Bos';
          localStorage.setItem('namaUser', nama);
        }

        btn.disabled = true;
        welcome.textContent = 'Sedang menghubungkan ke Google...';

        setTimeout(() => {
          updateUI();
          btn.disabled = false;
          window.open('https://www.google.com', '_blank');
        }, 1000);
      }
    }

    function updateUI() {
      if (isLogin) {
        btn.textContent = 'Logout';
        btn.className = 'logout';
        welcome.textContent = `Halo ${nama}, lu udah login! 🎉`;
      } else {
        btn.textContent = 'Login';
        btn.className = 'login';
        welcome.textContent = '';
      }
    }
  </script>
</body>
</html>
