<!DOCTYPE html>
<html>
<head>
  <title>Login Windows KW</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      background-size: cover;
      background-position: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
    }
    #clock {
      position: absolute;
      top: 20px;
      right: 30px;
      color: white;
      text-align: right;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    #time {
      font-size: 42px;
      font-weight: 300;
    }
    #date {
      font-size: 18px;
      opacity: 0.8;
    }
   .profile-pic {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.8);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      margin-bottom: 20px;
      object-fit: cover;
      cursor: pointer;
    }
   .name-text {
      color: white;
      font-size: 28px;
      font-weight: 500;
      margin-bottom: 25px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      text-transform: uppercase;
    }
    #loginArea {
      text-align: center;
    }
   .pin-label {
      color: rgba(255,255,255,0.9);
      font-size: 18px;
      margin-bottom: 12px;
    }
   .pin-input {
      padding: 12px 20px;
      font-size: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      background: rgba(255,255,255,0.15);
      color: white;
      text-align: center;
      letter-spacing: 8px;
      width: 220px;
      outline: none;
      backdrop-filter: blur(10px);
      display: block;
      margin: 0 auto 20px auto;
    }
   .pin-input:focus {
      border-color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.25);
    }
   .pin-input::placeholder {
      color: rgba(255,255,255,0.5);
      letter-spacing: normal;
    }
   .btn {
      color: white;
      border: none;
      padding: 12px 40px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      background: rgba(255,255,255,0.2);
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      margin-top: 25px;
    }
   .btn:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.05);
    }
   .forgot-pin {
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      cursor: pointer;
      text-decoration: underline;
      margin-top: 15px;
      display: block;
    }
   .forgot-pin:hover {
      color: white;
    }
   .btn-logout {
      background: rgba(239, 68, 68, 0.7);
      margin-top: 35px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
   .btn-logout:hover {
      background: rgba(239, 68, 68, 0.9);
    }
    #welcome {
      margin-top: 30px;
      font-size: 28px;
      color: white;
      font-weight: bold;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    footer {
      position: absolute;
      bottom: 20px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    }
   .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      top: -10px;
      animation: fall 3s linear forwards;
      z-index: 1;
    }
    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }
   .hidden {
      display: none;
    }
    #changeWallpaper {
      position: absolute;
      bottom: 60px;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      text-decoration: underline;
    }
    #changeWallpaper:hover {
      color: white;
    }
  </style>
</head>
<body>
  <div id="clock">
    <div id="time"></div>
    <div id="date"></div>
  </div>

  <img class="profile-pic" id="profilePic" src="attachment://27143753671978832" alt="Foto Profil" onclick="document.getElementById('fileInput').click()">
  <input type="file" id="fileInput" accept="image/*" onchange="loadFoto(event)" style="display:none">

  <div class="name-text" id="nameText">Adrianus Marut</div>

  <div id="loginArea">
    <div class="pin-label">Masukkan PIN Anda</div>
    <input type="password" class="pin-input" id="pinInput" placeholder="PIN" maxlength="6">
    <button class="btn" onclick="cekPIN()">Masuk</button>
    <div class="forgot-pin" onclick="resetPIN()">Lupa PIN</div>
  </div>

  <div id="logoutArea" class="hidden">
    <div id="welcome"></div>
    <button class="btn btn-logout" onclick="logout()">Logout</button>
  </div>

  <div id="changeWallpaper" onclick="document.getElementById('wallpaperInput').click()">Ganti Wallpaper</div>
  <input type="file" id="wallpaperInput" accept="image/*" onchange="loadWallpaper(event)" style="display:none">

  <footer>@ 2026 Hak Cipta Adrianus Marut</footer>

  <script>
    const profilePic = document.getElementById('profilePic');
    const nameText = document.getElementById('nameText');
    const pinInput = document.getElementById('pinInput');
    const welcome = document.getElementById('welcome');
    const loginArea = document.getElementById('loginArea');
    const logoutArea = document.getElementById('logoutArea');
    const body = document.body;

    let nama = localStorage.getItem('namaUser') || 'Adrianus Marut';
    let isLogin = localStorage.getItem('isLogin') === 'true';

    nameText.textContent = nama;

    const fotoTersimpan = localStorage.getItem('fotoUser');
    if (fotoTersimpan) {
      profilePic.src = fotoTersimpan;
    }

    const wallpaperTersimpan = localStorage.getItem('wallpaperUser');
    if (wallpaperTersimpan) {
      body.style.backgroundImage = `url(${wallpaperTersimpan})`;
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playBeep() {
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      oscillator.type = 'sine';
      oscillator.frequency.value = 800;
      gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      oscillator.start(audioCtx.currentTime);
      oscillator.stop(audioCtx.currentTime + 0.1);
    }

    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
      const date = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      document.getElementById('time').textContent = time;
      document.getElementById('date').textContent = date;
    }
    updateClock();
    setInterval(updateClock, 1000);

    updateUI();

    function loadFoto(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          profilePic.src = e.target.result;
          localStorage.setItem('fotoUser', e.target.result);
        }
        reader.readAsDataURL(file);
      }
    }

    function loadWallpaper(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          body.style.backgroundImage = `url(${e.target.result})`;
          localStorage.setItem('wallpaperUser', e.target.result);
        }
        reader.readAsDataURL(file);
      }
    }

    function createConfetti() {
      const colors = ['#ff0', '#f0f', '#0ff', '#f00', '#0f0', '#00f', '#ff8c00'];
      for (let i = 0; i < 100; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDelay = Math.random() * 0.5 + 's';
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 3000);
      }
    }

    function cekPIN() {
      let pinTersimpan = localStorage.getItem('pinUser');
      let pinMasukkan = pinInput.value;

      if (!pinTersimpan) {
        if (pinMasukkan.length < 4) {
          alert('PIN minimal 4 angka bos!');
          return;
        }
        localStorage.setItem('pinUser', pinMasukkan);
        loginSukses();
      } else {
        if (pinMasukkan === pinTersimpan) {
          loginSukses();
        } else {
          alert('PIN salah bos! Coba lagi.');
          pinInput.value = '';
          pinInput.focus();
        }
      }
    }

    function loginSukses() {
      isLogin = true;
      localStorage.setItem('isLogin', 'true');
      createConfetti();
      updateUI();

      setTimeout(() => {
        let pilihan = prompt(`Mau buka apa bos?\n\nKetik salah satu:\nIG, WA, FB, TIKTOK, YOUTUBE, GOOGLE`).toUpperCase();

        let link = {
          'IG': 'https://www.instagram.com',
          'WA': 'https://web.whatsapp.com',
          'FB': 'https://www.facebook.com',
          'TIKTOK': 'https://www.tiktok.com',
          'YOUTUBE': 'https://www.youtube.com',
          'GOOGLE': 'https://www.google.com'
        };

        if (link[pilihan]) {
          window.location.href = link[pilihan];
        } else if (pilihan) {
          alert('Pilihan nggak ada bos! Ketik IG, WA, FB, TIKTOK, YOUTUBE, atau GOOGLE');
        }
      }, 2000);
    }

    function logout() {
      let yakin = confirm(`Yakin mau logout, ${nama}?`);
      if (yakin) {
        isLogin = false;
        localStorage.setItem('isLogin', 'false');
        pinInput.value = '';
        updateUI();
      }
    }

    function resetPIN() {
      let yakin = confirm('Yakin mau reset PIN? PIN lama bakal kehapus.');
      if (yakin) {
        localStorage.removeItem('pinUser');
        alert('PIN udah direset. Ketik PIN baru pas login lagi.');
        pinInput.value = '';
        pinInput.focus();
      }
    }

    function updateUI() {
      if (isLogin) {
        loginArea.classList.add('hidden');
        logoutArea.classList.remove('hidden');
        welcome.textContent = `Halo ${nama}, lu udah login! 🎉`;
      } else {
        loginArea.classList.remove('hidden');
        logoutArea.classList.add('hidden');
        welcome.textContent = '';
      }
    }

    pinInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        cekPIN();
      } else if (!isNaN(e.key)) {
        playBeep();
      }
    });

    document.addEventListener('click', () => {
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }, { once: true });
  </script>
</body>
</html>
