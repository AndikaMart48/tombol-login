<!DOCTYPE html>
<html>
<head>
  <title>Tombol Login Keren</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Arial', sans-serif;
    }
    button {
      color: white;
      border: none;
      padding: 18px 50px;
      font-size: 20px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    button:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
    .login {
      background: linear-gradient(135deg, #8b5cf6, #a855f7);
    }
    .logout {
      background: linear-gradient(135deg, #ef4444, #f87171);
    }
    #welcome {
      margin-top: 30px;
      font-size: 24px;
      color: white;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    footer {
      position: absolute;
      bottom: 20px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <button id="btnLogin" onclick="toggleLogin()">Login</button>
  <div id="welcome"></div>
  <footer>@ 2026 Hak Cipta Adrianus Marut</footer>

  <script>
    const btn = document.getElementById('btnLogin');
    const welcome = document.getElementById('welcome');
    
    let nama = localStorage.getItem('namaUser') || 'Bos';
    let isLogin = localStorage.getItem('isLogin') === 'true';
    updateUI();

    function toggleLogin() {
      if (isLogin) {
        let yakin = confirm(`Yakin mau logout, ${nama}?`);
        if (yakin) {
          isLogin = false;
          localStorage.setItem('isLogin', 'false');
          
          welcome.textContent = `Sampai jumpa lagi, ${nama}! 👋`;
          btn.disabled = true;
          
          setTimeout(() => {
            updateUI();
            btn.disabled = false;
          }, 2000);
        }
      } else {
        isLogin = true;
        localStorage.setItem('isLogin', 'true');
        
        if (!localStorage.getItem('namaUser')) {
          nama = prompt('Siapa nama lu bos?') || 'Bos';
          localStorage.setItem('namaUser', nama);
        }
        
        updateUI();
        window.open('https://www.google.com', '_blank');
      }
    }

    function updateUI() {
      if (isLogin) {
        btn.textContent = 'Logout';
        btn.className = 'logout';
        welcome.textContent = `Halo ${nama}, lu udah login! 🎉`;
      } else {
        btn.textContent = 'Login';
        btn.className = 'login';
        welcome.textContent = '';
      }
    }
  </script>
</body>
</html>
