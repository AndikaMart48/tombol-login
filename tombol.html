<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Modern</title>
  <style>
    * { box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Arial', sans-serif;
    }
   .container {
      background: white;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      width: 100%;
      max-width: 350px;
    }
   .profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid #667eea;
      object-fit: cover;
      margin-bottom: 20px;
      cursor: pointer;
    }
   .name-text {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 30px;
      color: #333;
    }
    input {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      border: 2px solid #ddd;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 20px;
      outline: none;
    }
    input:focus {
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 15px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #667eea;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }
    button:hover {
      background: #5568d3;
    }
   .btn-logout {
      background: #ff4757;
    }
   .btn-logout:hover {
      background: #ff3742;
    }
   .forgot {
      color: #667eea;
      cursor: pointer;
      text-decoration: underline;
      font-size: 14px;
    }
   .hidden { display: none; }
    #welcome {
      font-size: 22px;
      margin-bottom: 20px;
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="profile-pic" id="profilePic" src="attachment://27143753671978832" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" accept="image/*" onchange="loadFoto(event)" style="display:none">

    <div class="name-text" id="nameText">ANDIKA MART</div>

    <div id="loginArea">
      <input type="password" id="pinInput" placeholder="Masukkan PIN" maxlength="6">
      <button onclick="cekPIN()">MASUK</button>
      <div class="forgot" onclick="resetPIN()">Lupa PIN?</div>
    </div>

    <div id="logoutArea" class="hidden">
      <div id="welcome"></div>
      <button class="btn-logout" onclick="logout()">KELUAR</button>
    </div>
  </div>

  <script>
    const profilePic = document.getElementById('profilePic');
    const nameText = document.getElementById('nameText');
    const pinInput = document.getElementById('pinInput');
    const welcome = document.getElementById('welcome');
    const loginArea = document.getElementById('loginArea');
    const logoutArea = document.getElementById('logoutArea');

    let nama = localStorage.getItem('namaUser') || 'ANDIKA MART';
    let isLogin = localStorage.getItem('isLogin') === 'true';
    nameText.textContent = nama;

    const fotoTersimpan = localStorage.getItem('fotoUser');
    if (fotoTersimpan) profilePic.src = fotoTersimpan;

    updateUI();

    function loadFoto(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = e => {
          profilePic.src = e.target.result;
          localStorage.setItem('fotoUser', e.target.result);
        }
        reader.readAsDataURL(file);
      }
    }

    function cekPIN() {
      let pinTersimpan = localStorage.getItem('pinUser');
      let pinMasukkan = pinInput.value;

      if (!pinTersimpan) {
        if (pinMasukkan.length < 4) {
          alert('PIN minimal 4 angka');
          return;
        }
        localStorage.setItem('pinUser', pinMasukkan);
        loginSukses();
      } else {
        if (pinMasukkan === pinTersimpan) {
          loginSukses();
        } else {
          alert('PIN salah!');
          pinInput.value = '';
        }
      }
    }

    function loginSukses() {
      isLogin = true;
      localStorage.setItem('isLogin', 'true');
      updateUI();
      setTimeout(() => {
        let pilihan = prompt('Mau buka apa?\nIG, WA, FB, TIKTOK, YOUTUBE, GOOGLE').toUpperCase();
        let link = {
          'IG': 'https://www.instagram.com',
          'WA': 'https://web.whatsapp.com',
          'FB': 'https://www.facebook.com',
          'TIKTOK': 'https://www.tiktok.com',
          'YOUTUBE': 'https://www.youtube.com',
          'GOOGLE': 'https://www.google.com'
        };
        if (link[pilihan]) window.location.href = link[pilihan];
      }, 1000);
    }

    function logout() {
      if (confirm('Yakin mau keluar?')) {
        isLogin = false;
        localStorage.setItem('isLogin', 'false');
        pinInput.value = '';
        updateUI();
      }
    }

    function resetPIN() {
      if (confirm('Reset PIN?')) {
        localStorage.removeItem('pinUser');
        alert('PIN sudah direset');
        pinInput.value = '';
      }
    }

    function updateUI() {
      if (isLogin) {
        loginArea.classList.add('hidden');
        logoutArea.classList.remove('hidden');
        welcome.textContent = `Selamat Datang, ${nama}`;
      } else {
        loginArea.classList.remove('hidden');
        logoutArea.classList.add('hidden');
      }
    }

    pinInput.addEventListener('keypress', e => {
      if (e.key === 'Enter') cekPIN();
    });
  </script>
</body>
</html>
