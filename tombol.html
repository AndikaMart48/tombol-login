<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windows Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: url('attachment://unnamed') center/cover no-repeat fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
  .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(5px);
    }
  .container {
      position: relative;
      z-index: 10;
      text-align: center;
      color: white;
      max-width: 360px;
      width: 90%;
    }
  .clock {
      font-size: 56px;
      font-weight: 200;
      margin-bottom: 5px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.7);
    }
  .date {
      font-size: 18px;
      font-weight: 300;
      margin-bottom: 40px;
      opacity: 0.9;
      text-shadow: 0 2px 10px rgba(0,0,0,0.7);
    }
  .loginBox {
      background: rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 35px 30px;
      backdrop-filter: blur(15px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
  .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.4);
      object-fit: cover;
      margin: 0 auto 20px;
      cursor: pointer;
      display: block;
      transition: all 0.3s;
    }
  .avatar:hover {
      border-color: white;
      transform: scale(1.05);
    }
  .userName {
      font-size: 24px;
      font-weight: 400;
      margin-bottom: 25px;
    }
  .pinDots {
      font-size: 28px;
      letter-spacing: 8px;
      margin-bottom: 20px;
      opacity: 0.7;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 4px;
      color: white;
      font-size: 15px;
      margin-bottom: 12px;
    }
    input::placeholder {
      color: rgba(255,255,255,0.6);
    }
    input:focus {
      outline: none;
      border-color: white;
      background: rgba(0,0,0,0.4);
    }
    button {
      width: 100%;
      padding: 12px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      background: #106ebe;
    }
  .link {
      margin-top: 20px;
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      text-decoration: underline;
    }
  .link:hover {
      color: white;
    }
  .hidden { display: none; }
  .status {
      font-size: 13px;
      margin-bottom: 12px;
      min-height: 18px;
    }
  .bottomBar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 20;
    }
  .copyright {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }
  .wallpaperBtn {
      padding: 8px 16px;
      background: rgba(0,0,0,0.4);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
  .wallpaperBtn:hover {
      background: rgba(0,0,0,0.6);
    }
  .desktopArea {
      text-align: center;
    }
  .appGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 30px 0;
    }
  .appBtn {
      padding: 12px 8px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: white;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
  .appBtn:hover {
      background: rgba(255,255,255,0.2);
    }
  .backBtn {
      background: rgba(239,68,68,0.8);
      margin-top: 15px;
    }
  .backBtn:hover {
      background: rgba(220,38,38,0.9);
    }
  </style>
</head>
<body>
  <div class="overlay"></div>

  <div class="container">
    <div class="clock" id="clock">00:00:00</div>
    <div class="date" id="date">Loading...</div>

    <div id="loginArea" class="loginBox">
      <img class="avatar" id="avatar" src="attachment://unnamed" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept="image/*" onchange="loadFoto(event)" style="display:none">

      <div class="status" id="statusMsg"></div>
      <input type="text" id="nameInput" placeholder="Enter your name" maxlength="30">
      <input type="password" id="pinInput" placeholder="Enter your PIN" maxlength="6">
      <button onclick="login()">Sign in</button>
      <div class="link" onclick="resetData()">Not you? Change user</div>
    </div>

    <div id="desktopArea" class="loginBox hidden">
      <img class="avatar" id="avatar2" src="" onclick="document.getElementById('fileInput2').click()">
      <input type="file" id="fileInput2" accept="image/*" onchange="loadFoto2(event)" style="display:none">

      <div class="userName" id="userName">User</div>
      <div class="pinDots">••••••</div>
      <div style="font-size: 14px; opacity: 0.8; margin-bottom: 25px;">Masukkan PIN Anda</div>

      <div class="appGrid">
        <div class="appBtn" onclick="bukaApp('instagram')">Instagram</div>
        <div class="appBtn" onclick="bukaApp('whatsapp')">WhatsApp</div>
        <div class="appBtn" onclick="bukaApp('facebook')">Facebook</div>
        <div class="appBtn" onclick="bukaApp('tiktok')">TikTok</div>
        <div class="appBtn" onclick="bukaApp('youtube')">YouTube</div>
        <div class="appBtn" onclick="bukaApp('google')">Google</div>
      </div>

      <button class="backBtn" onclick="logout()">Kembali ke Login</button>
    </div>
  </div>

  <div class="bottomBar">
    <div class="copyright">@2026 Hak Cipta Adrianus Marut</div>
    <button class="wallpaperBtn" onclick="document.getElementById('wallpaperInput').click()">Change Wallpaper</button>
    <input type="file" id="wallpaperInput" accept="image/*" onchange="loadWallpaper(event)" style="display:none">
  </div>

  <script>
    const avatar = document.getElementById('avatar');
    const avatar2 = document.getElementById('avatar2');
    const nameInput = document.getElementById('nameInput');
    const pinInput = document.getElementById('pinInput');
    const statusMsg = document.getElementById('statusMsg');
    const loginArea = document.getElementById('loginArea');
    const desktopArea = document.getElementById('desktopArea');
    const userName = document.getElementById('userName');
    const clockEl = document.getElementById('clock');
    const dateEl = document.getElementById('date');

    const defaultAvatar = "attachment://unnamed";

    let currentName = localStorage.getItem('currentUser') || '';
    let isLogin = localStorage.getItem('isLogin') === 'true';

    function updateClock() {
      const now = new Date();
      clockEl.textContent = now.toLocaleTimeString('en-US', { hour12: false });
      dateEl.textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    const savedWallpaper = localStorage.getItem('wallpaper');
    if (savedWallpaper) {
      document.body.style.backgroundImage = `url(${savedWallpaper})`;
    }

    if (isLogin && currentName) {
      loadUserPhoto(currentName);
      loginSuccess();
    }

    function loadFoto(event) {
      const file = event.target.files[0];
      if (file && nameInput.value.trim()) {
        const reader = new FileReader();
        reader.onload = e => {
          avatar.src = e.target.result;
          let key = 'photo_' + nameInput.value.trim().toLowerCase();
          localStorage.setItem(key, e.target.result);
          statusMsg.textContent = 'Photo updated!';
          statusMsg.style.color = '#4ade80';
          setTimeout(() => statusMsg.textContent = '', 2000);
        }
        reader.readAsDataURL(file);
      } else {
        alert('Ketik nama dulu baru ganti foto');
      }
    }

    function loadFoto2(event) {
      const file = event.target.files[0];
      if (file && currentName) {
        const reader = new FileReader();
        reader.onload = e => {
          avatar2.src = e.target.result;
          let key = 'photo_' + currentName.toLowerCase();
          localStorage.setItem(key, e.target.result);
        }
        reader.readAsDataURL(file);
      }
    }

    function loadWallpaper(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = e => {
          document.body.style.backgroundImage = `url(${e.target.result})`;
          localStorage.setItem('wallpaper', e.target.result);
        }
        reader.readAsDataURL(file);
      }
    }

    function loadUserPhoto(nama) {
      let key = 'photo_' + nama.toLowerCase();
      let foto = localStorage.getItem(key);
      avatar.src = foto || defaultAvatar;
      avatar2.src = foto || defaultAvatar;
    }

    function login() {
      let nama = nameInput.value.trim();
      let pin = pinInput.value;

      if (!nama) {
        alert('Masukkan nama');
        return;
      }

      currentName = nama;
      let pinKey = 'pin_' + nama.toLowerCase();
      let savedPin = localStorage.getItem(pinKey);

      if (!savedPin) {
        if (pin.length < 4) {
          alert('PIN minimal 4 digit');
          return;
        }
        localStorage.setItem(pinKey, pin);
        statusMsg.textContent = 'Akun baru dibuat';
        statusMsg.style.color = '#4ade80';
      } else {
        if (pin!== savedPin) {
          alert('PIN salah');
          pinInput.value = '';
          return;
        }
      }

      loadUserPhoto(nama);
      isLogin = true;
      localStorage.setItem('isLogin', 'true');
      localStorage.setItem('currentUser', nama);
      loginSuccess();
    }

    function loginSuccess() {
      userName.textContent = currentName;
      loginArea.classList.add('hidden');
      desktopArea.classList.remove('hidden');
      nameInput.value = '';
      pinInput.value = '';
      statusMsg.textContent = '';
    }

    function logout() {
      isLogin = false;
      localStorage.setItem('isLogin', 'false');
      desktopArea.classList.add('hidden');
      loginArea.classList.remove('hidden');
      avatar.src = defaultAvatar;
    }

    function resetData() {
      if (confirm('Reset semua data?')) {
        localStorage.clear();
        location.reload();
      }
    }

    function bukaApp(app) {
      const links = {
        'instagram': 'https://www.instagram.com',
        'whatsapp': 'https://web.whatsapp.com',
        'facebook': 'https://web.facebook.com',
        'tiktok': 'https://www.tiktok.com',
        'youtube': 'https://www.youtube.com',
        'google': 'https://www.google.com'
      };
      window.open(links[app], '_blank');
    }
  </script>
</body>
</html>
